name: AstroPotatoChatPhone
options:
  bundleIdPrefix: com.aoiastro
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: '5.10'
    SWIFT_ENABLE_CXX_INTEROP: YES
packages:
  LocalLLMClient:
    url: https://github.com/tattn/LocalLLMClient.git
    branch: main

targets:
  AstroPotatoChatPhone:
    type: application
    platform: iOS
    sources:
      - App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aoiastro.apcp
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/AstroPotatoChatPhone.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        SWIFT_ENABLE_CXX_INTEROP: YES
        OTHER_SWIFT_FLAGS: '$(inherited) -Xfrontend -cxx-interoperability-mode=default'
        CLANG_CXX_LANGUAGE_STANDARD: gnu++20
        CLANG_CXX_LIBRARY: libc++
    dependencies:
      - package: LocalLLMClient
        product: LocalLLMClient
      - package: LocalLLMClient
        product: LocalLLMClientLlama
